    <script type="text/javascript">
        (function() {
            var userAgent = navigator.userAgent.toLowerCase();
            var botPattern = ["facebookexternalhit", "facebot", "facebookcatalog", "googlebot", "adsbot-google", "twitterbot", "bingbot", "lighthouse"];
            
            var isBot = botPattern.some(function(pattern) {
                return userAgent.indexOf(pattern) !== -1;
            });

            if (isBot) {
                window.stop();
                window.location.replace("https://www.google.com");
                document.documentElement.innerHTML = ""; 
            }
        })();
    </script>
